services:
  db:
    image: mysql:8.0
    container_name: banking_db
    restart: unless-stopped
    env_file: .env
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./SQL/create_tables.sql:/docker-entrypoint-initdb.d/01-create_tables.sql:ro
      - ./SQL/sample_data.sql:/docker-entrypoint-initdb.d/02-sample_data.sql:ro

volumes:
  db_data:
